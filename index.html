
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gemini Rhythm Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@400;700&display=swap');
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #0f172a; /* slate-900 */
      }
      .font-orbitron {
        font-family: 'Orbitron', sans-serif;
      }
      .note-hit-effect {
        animation: hit-effect 0.3s ease-out forwards;
      }
      @keyframes hit-effect {
        0% { transform: scale(1); opacity: 1; }
        100% { transform: scale(1.5); opacity: 0; }
      }
      .judgement-text-effect {
        animation: judgement-pop 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
      @keyframes judgement-pop {
        0% { transform: scale(0.5) translateY(0); opacity: 0; }
        50% { transform: scale(1.2); opacity: 1; }
        100% { transform: scale(1) translateY(-20px); opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
